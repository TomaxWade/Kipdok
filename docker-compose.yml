services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kipdok
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-file:./data/db/app.db}
      DATA_ROOT: ${DATA_ROOT:-./data}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-replace-with-a-strong-password}
      APP_NAME: ${APP_NAME:-Kipdok}
      APP_BASE_URL: ${APP_BASE_URL:-http://127.0.0.1:3000/kipdok}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/kipdok/login').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
